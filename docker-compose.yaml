# SUM Chain Docker Compose for Local Development / SNIP testnet local-mirror.
#
# What this gives you:
#   - 3 PoA validators producing blocks via round-robin (no skip-proposer
#     fallback in current PoA — see crates/consensus/src/poa.rs:213-238 — so
#     all three pods need to stay up for liveness).
#   - A non-validator full node for SNIP integration tests to point RPC at,
#     keeping the validators free of test-client load.
#   - Prometheus + Grafana for chain metrics.
#
# Files referenced from this compose are real, checked-in artifacts:
#   ./genesis/local_genesis.json   — validators + pre-funded test accounts;
#                                    matches the keys below by pubkey.
#   ./keys/validator{1,2,3}.json   — JSON-encoded [u8; 32] private-key seed,
#                                    the format crates/node/src/main.rs:367
#                                    feeds into KeyPair::from_bytes.
#
# Usage:
#   docker-compose up -d --build       # Start everything (first run builds)
#   docker-compose logs -f validator-1 # Tail one validator's log
#   curl http://localhost:8548/        # Hit the full-node RPC (no auth)
#   docker-compose down -v             # Stop and wipe block data
#
# Earlier versions of this file pointed at ./deploy/config/validator-{1,2,3}/
# and ./deploy/keys/validator-{1,2,3}/ which never existed in the repo. Fixed
# in this revision to mount the actual checked-in files.

services:
  # Validator 1 — bootnode for the others.
  validator-1:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sumchain-validator-1
    hostname: validator-1
    command:
      - "run"
      - "--genesis"
      - "/config/genesis.json"
      - "--data-dir"
      - "/data"
      - "--validator-key"
      - "/secrets/validator.key"
      - "--p2p-addr"
      - "/ip4/0.0.0.0/tcp/30303"
      - "--rpc-addr"
      - "0.0.0.0:8545"
    volumes:
      - validator-1-data:/data
      - ./genesis/local_genesis.json:/config/genesis.json:ro
      - ./keys/validator1.json:/secrets/validator.key:ro
    ports:
      - "30303:30303"
      - "8545:8545"
      - "9090:9090"
    environment:
      - RUST_LOG=info,sumchain=debug
    networks:
      - sumchain
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8545/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # Validator 2 — bootstraps off validator-1.
  validator-2:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sumchain-validator-2
    hostname: validator-2
    command:
      - "run"
      - "--genesis"
      - "/config/genesis.json"
      - "--data-dir"
      - "/data"
      - "--validator-key"
      - "/secrets/validator.key"
      - "--p2p-addr"
      - "/ip4/0.0.0.0/tcp/30303"
      - "--rpc-addr"
      - "0.0.0.0:8545"
      # Compose's internal DNS resolves `validator-1` to its container IP;
      # libp2p `/dns4/` multiaddrs work natively. If the p2p stack ever swaps
      # to a DNS-incompatible backend, fall back to a static IPAM
      # `ipv4_address` per service and use `/ip4/172.28.0.X/tcp/30303` here.
      - "--bootnodes"
      - "/dns4/validator-1/tcp/30303"
    volumes:
      - validator-2-data:/data
      - ./genesis/local_genesis.json:/config/genesis.json:ro
      - ./keys/validator2.json:/secrets/validator.key:ro
    ports:
      - "30304:30303"
      - "8546:8545"
      - "9091:9090"
    environment:
      - RUST_LOG=info,sumchain=debug
    networks:
      - sumchain
    depends_on:
      - validator-1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8545/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # Validator 3 — bootstraps off validator-1.
  validator-3:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sumchain-validator-3
    hostname: validator-3
    command:
      - "run"
      - "--genesis"
      - "/config/genesis.json"
      - "--data-dir"
      - "/data"
      - "--validator-key"
      - "/secrets/validator.key"
      - "--p2p-addr"
      - "/ip4/0.0.0.0/tcp/30303"
      - "--rpc-addr"
      - "0.0.0.0:8545"
      - "--bootnodes"
      - "/dns4/validator-1/tcp/30303"
    volumes:
      - validator-3-data:/data
      - ./genesis/local_genesis.json:/config/genesis.json:ro
      - ./keys/validator3.json:/secrets/validator.key:ro
    ports:
      - "30305:30303"
      - "8547:8545"
      - "9092:9090"
    environment:
      - RUST_LOG=info,sumchain=debug
    networks:
      - sumchain
    depends_on:
      - validator-1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8545/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # Non-validator full node — recommended SNIP RPC endpoint so client load
  # doesn't touch the proposers' mempool. No --validator-key, so the binary
  # runs in observe-only mode (PoR challenges are a chain-wide concern, not
  # this node's; it just imports blocks and serves RPCs).
  fullnode:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sumchain-fullnode
    hostname: fullnode
    command:
      - "run"
      - "--genesis"
      - "/config/genesis.json"
      - "--data-dir"
      - "/data"
      - "--p2p-addr"
      - "/ip4/0.0.0.0/tcp/30303"
      - "--rpc-addr"
      - "0.0.0.0:8545"
      - "--bootnodes"
      - "/dns4/validator-1/tcp/30303"
    volumes:
      - fullnode-data:/data
      - ./genesis/local_genesis.json:/config/genesis.json:ro
    ports:
      - "30306:30303"
      - "8548:8545"   # SNIP integration clients point at host port 8548
      - "9093:9090"
    environment:
      - RUST_LOG=info,sumchain=debug
    networks:
      - sumchain
    depends_on:
      - validator-1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8545/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # Prometheus for chain metrics
  prometheus:
    image: prom/prometheus:v2.47.0
    container_name: sumchain-prometheus
    volumes:
      - ./deploy/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9099:9090"
    networks:
      - sumchain
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    restart: unless-stopped

  # Grafana for dashboards
  grafana:
    image: grafana/grafana:10.1.0
    container_name: sumchain-grafana
    volumes:
      - grafana-data:/var/lib/grafana
      - ./deploy/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./deploy/monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=sumchain
      - GF_USERS_ALLOW_SIGN_UP=false
    networks:
      - sumchain
    depends_on:
      - prometheus
    restart: unless-stopped

networks:
  sumchain:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

volumes:
  validator-1-data:
  validator-2-data:
  validator-3-data:
  fullnode-data:
  prometheus-data:
  grafana-data:
