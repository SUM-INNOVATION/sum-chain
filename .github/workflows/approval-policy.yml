name: Approval policy

# Enforces the conditional approval policy from CONTRIBUTING.md:
#   - PR authored by sunhaoxiangwang -> requires >= 1 admin/maintainer approval
#   - PR authored by anyone else     -> requires >= 2 admin/maintainer approvals
# A qualifying approver has repo permission "admin" or "maintain". Only the
# latest APPROVED review per reviewer counts; the author is excluded; a PR
# author's own review never counts.
#
# The gate is THIS job's own check-run conclusion (pass = exit 0, fail = exit 1).
# No custom commit statuses are written, so an approved/merged PR never carries a
# stale failure mark. Per-PR concurrency with cancel-in-progress lets GitHub
# retire obsolete runs, leaving exactly one visible `approval-policy` check.
#
# Branch protection requires the check context "approval-policy" — which is this
# job's name, so the GitHub Actions check-run satisfies it directly (no separate
# status context). Runs via pull_request_target so the base-repo token can read
# collaborator permissions (needed for fork PRs); this workflow never checks out
# PR code, so pull_request_target is safe here.

on:
  pull_request_target:
    types: [opened, reopened, synchronize]
  pull_request_review:
    types: [submitted, dismissed, edited]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: approval-policy-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  approval-policy:
    name: approval-policy
    runs-on: ubuntu-latest
    steps:
      - name: Evaluate approval policy
        env:
          GH_TOKEN: ${{ github.token }}
          OWNER: ${{ github.repository_owner }}
          REPO: ${{ github.event.repository.name }}
          PR: ${{ github.event.pull_request.number }}
          AUTHOR: ${{ github.event.pull_request.user.login }}
        run: |
          set -euo pipefail
          echo "PR #${PR} by ${AUTHOR}"

          # Latest review state per reviewer; keep only APPROVED; drop the author.
          approvers=$(gh api --paginate "repos/${OWNER}/${REPO}/pulls/${PR}/reviews" \
            | jq -r '
                group_by(.user.login)
                | map(max_by(.submitted_at))
                | map(select(.state == "APPROVED"))
                | .[].user.login' \
            | sort -u | grep -vx "${AUTHOR}" || true)
          echo "Approvers (author excluded): ${approvers:-none}"

          # Count reviewers whose repo permission is admin or maintain.
          qualified=0
          for u in ${approvers}; do
            perm=$(gh api "repos/${OWNER}/${REPO}/collaborators/${u}/permission" \
              --jq '.permission' 2>/dev/null || echo "unknown")
            echo "  reviewer ${u}: permission=${perm}"
            case "${perm}" in
              admin|maintain) qualified=$((qualified + 1)) ;;
            esac
          done

          if [ "${AUTHOR}" = "sunhaoxiangwang" ]; then need=1; else need=2; fi
          echo "Result: ${qualified}/${need} admin-or-maintainer approvals"

          # The job conclusion IS the required check — no commit status is posted.
          if [ "${qualified}" -ge "${need}" ]; then
            echo "Approval policy satisfied."
          else
            echo "::error::Approval policy not met: ${qualified}/${need} admin-or-maintainer approvals."
            exit 1
          fi
