name: Approval policy

# Enforces the conditional approval policy from CONTRIBUTING.md as a WAITING gate:
#   - PR authored by sunhaoxiangwang -> requires >= 1 admin/maintainer approval
#   - PR authored by anyone else     -> requires >= 2 admin/maintainer approvals
# A qualifying approver has repo permission "admin" or "maintain". Only the
# latest APPROVED review per reviewer counts; the author is excluded; a PR
# author's own review never counts.
#
# State machine (the check is NEVER a red "failure" — it is a waiting gate):
#   * not yet satisfied  -> check-run status=in_progress (PENDING / yellow).
#                           Blocks merge, but reads as "waiting for approval".
#   * satisfied          -> check-run status=completed, conclusion=success (green).
#   * new commit pushed  -> stale approvals dismissed (branch protection) + a
#                           fresh PENDING check is published on the new head sha
#                           -> waits for re-review.
#   * approval dismissed / changes requested -> back to PENDING.
#
# Exactly ONE check-run named `approval-policy` per head sha is kept (found and
# updated in place), so there is never a mix of stale failure/success runs that
# could deadlock the required check. No commit statuses are written. Concurrency
# is per-PR and DOES NOT cancel (runs queue), so there are no canceled runs.
#
# Branch protection requires the check context "approval-policy" (this check-run
# name). Runs via pull_request_target so the base-repo token can read collaborator
# permissions; this workflow never checks out PR code, so that is safe.

on:
  pull_request_target:
    types: [opened, reopened, synchronize]
  pull_request_review:
    types: [submitted, edited, dismissed]
  workflow_dispatch:
    inputs:
      pr:
        description: "PR number to (re)evaluate (manual recovery)"
        required: true
        type: string

permissions:
  contents: read
  pull-requests: read
  checks: write

concurrency:
  # Serialize per PR so the single check-run is updated in order. Do NOT cancel —
  # canceled runs are exactly the ugly red/gray marks we are removing.
  group: approval-policy-${{ github.event.pull_request.number || github.event.inputs.pr }}
  cancel-in-progress: false

jobs:
  approval-policy:
    name: approval-policy
    runs-on: ubuntu-latest
    steps:
      - name: Evaluate approval policy and update the waiting check
        env:
          GH_TOKEN: ${{ github.token }}
          OWNER: ${{ github.repository_owner }}
          REPO: ${{ github.event.repository.name }}
          PR: ${{ github.event.pull_request.number || github.event.inputs.pr }}
        run: |
          set -euo pipefail

          # Resolve author + current head sha for the PR (works for every trigger).
          meta=$(gh api "repos/${OWNER}/${REPO}/pulls/${PR}")
          AUTHOR=$(echo "${meta}" | jq -r '.user.login')
          HEAD_SHA=$(echo "${meta}" | jq -r '.head.sha')
          echo "PR #${PR} by ${AUTHOR} @ ${HEAD_SHA}"

          # Latest review state per reviewer; keep only APPROVED; drop the author.
          approvers=$(gh api --paginate "repos/${OWNER}/${REPO}/pulls/${PR}/reviews" \
            | jq -r '
                group_by(.user.login)
                | map(max_by(.submitted_at))
                | map(select(.state == "APPROVED"))
                | .[].user.login' \
            | sort -u | grep -vx "${AUTHOR}" || true)
          echo "Approvers (author excluded): ${approvers:-none}"

          # Count reviewers whose repo permission is admin or maintain.
          qualified=0
          for u in ${approvers}; do
            perm=$(gh api "repos/${OWNER}/${REPO}/collaborators/${u}/permission" \
              --jq '.permission' 2>/dev/null || echo "unknown")
            echo "  reviewer ${u}: permission=${perm}"
            case "${perm}" in
              admin|maintain) qualified=$((qualified + 1)) ;;
            esac
          done

          if [ "${AUTHOR}" = "sunhaoxiangwang" ]; then need=1; else need=2; fi
          if [ "${qualified}" -ge "${need}" ]; then
            title="Approved"
            summary="${qualified}/${need} admin-or-maintainer approvals — satisfied."
            # Green, mergeable.
            body=$(jq -n --arg sha "$HEAD_SHA" --arg t "$title" --arg s "$summary" \
              '{name:"approval-policy", head_sha:$sha, status:"completed", conclusion:"success", output:{title:$t, summary:$s}}')
          else
            title="Waiting for approval"
            summary="${qualified}/${need} admin-or-maintainer approvals — waiting for review."
            # PENDING (in_progress): blocks merge, shows yellow/waiting, NOT red.
            body=$(jq -n --arg sha "$HEAD_SHA" --arg t "$title" --arg s "$summary" \
              '{name:"approval-policy", head_sha:$sha, status:"in_progress", output:{title:$t, summary:$s}}')
          fi
          echo "${summary}"

          # Keep exactly one check-run per head sha: update in place if present,
          # else create it. Avoids the multiple-same-name deadlock.
          cid=$(gh api "repos/${OWNER}/${REPO}/commits/${HEAD_SHA}/check-runs" \
            --jq 'first(.check_runs[] | select(.name=="approval-policy") | .id) // empty')
          if [ -n "${cid}" ]; then
            echo "${body}" | gh api -X PATCH "repos/${OWNER}/${REPO}/check-runs/${cid}" --input - >/dev/null
            echo "Updated approval-policy check-run ${cid}."
          else
            echo "${body}" | gh api -X POST "repos/${OWNER}/${REPO}/check-runs" --input - >/dev/null
            echo "Created approval-policy check-run."
          fi
          # The job never fails — the waiting/green state lives in the check-run.
