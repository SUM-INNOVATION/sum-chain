name: Approval policy

# Enforces the conditional approval policy from CONTRIBUTING.md:
#   - PR authored by sunhaoxiangwang -> requires >= 1 admin/maintainer approval
#   - PR authored by anyone else     -> requires >= 2 admin/maintainer approvals
# A qualifying approver has repo permission "admin" or "maintain". Only the
# latest APPROVED review per reviewer counts; the author is excluded; a PR
# author's own review never counts.
#
# Why this shape:
#   * GitHub (Feb 2025) forbids workflows from writing/updating custom check-run
#     status/conclusions via the API. The only reliable required check a workflow
#     can drive is the JOB's own check-run (managed by Actions), which is binary
#     pass/fail. So the gate is this job's success/failure — no commit statuses,
#     no hand-rolled check-runs.
#   * It runs ONLY on review events (and manual dispatch). It does NOT run on PR
#     open/synchronize, so before anyone reviews there is NO run and NO red mark:
#     the required `approval-policy` check is simply absent, which GitHub shows as
#     "Expected — waiting for status" (a pending/blocking state, not a red X).
#   * A qualifying approval makes the job pass -> the check turns green -> the PR
#     becomes mergeable automatically (no manual step). A new commit dismisses the
#     stale approval (branch protection `dismiss_stale_reviews`), and since no
#     review has happened on the new commit yet, the check is again absent/waiting.
#   * The job only "fails" (red) if a review is submitted that genuinely does NOT
#     satisfy the policy (e.g. a non-admin approval, or 1-of-2). That is an
#     accurate "not satisfied" signal and clears automatically when a qualifying
#     approval arrives. With admin/maintainer reviewers it never goes red.
#
# Branch protection requires the check context "approval-policy" (this job name).
# Runs via pull_request_review (base-repo context) so the token can read
# collaborator permissions; this workflow never checks out PR code.

on:
  pull_request_review:
    types: [submitted, edited, dismissed]
  workflow_dispatch:
    inputs:
      pr:
        description: "PR number to (re)evaluate (manual recovery)"
        required: true
        type: string

permissions:
  contents: read
  pull-requests: read

concurrency:
  # One evaluation at a time per PR; do NOT cancel (canceled runs are exactly the
  # gray/red marks we are avoiding) — queued runs execute in order.
  group: approval-policy-${{ github.event.pull_request.number || github.event.inputs.pr }}
  cancel-in-progress: false

jobs:
  approval-policy:
    name: approval-policy
    runs-on: ubuntu-latest
    steps:
      - name: Evaluate approval policy
        env:
          GH_TOKEN: ${{ github.token }}
          OWNER: ${{ github.repository_owner }}
          REPO: ${{ github.event.repository.name }}
          PR: ${{ github.event.pull_request.number || github.event.inputs.pr }}
        run: |
          set -euo pipefail

          meta=$(gh api "repos/${OWNER}/${REPO}/pulls/${PR}")
          AUTHOR=$(echo "${meta}" | jq -r '.user.login')
          echo "PR #${PR} by ${AUTHOR}"

          # Latest review per reviewer; keep only APPROVED; drop the author.
          approvers=$(gh api --paginate "repos/${OWNER}/${REPO}/pulls/${PR}/reviews" \
            | jq -r '
                group_by(.user.login)
                | map(max_by(.submitted_at))
                | map(select(.state == "APPROVED"))
                | .[].user.login' \
            | sort -u | grep -vx "${AUTHOR}" || true)
          echo "Approvers (author excluded): ${approvers:-none}"

          qualified=0
          for u in ${approvers}; do
            perm=$(gh api "repos/${OWNER}/${REPO}/collaborators/${u}/permission" \
              --jq '.permission' 2>/dev/null || echo "unknown")
            echo "  reviewer ${u}: permission=${perm}"
            case "${perm}" in
              admin|maintain) qualified=$((qualified + 1)) ;;
            esac
          done

          if [ "${AUTHOR}" = "sunhaoxiangwang" ]; then need=1; else need=2; fi
          echo "Result: ${qualified}/${need} admin-or-maintainer approvals"

          if [ "${qualified}" -ge "${need}" ]; then
            echo "Approval policy satisfied."
          else
            echo "::error::Approval policy not met — waiting for ${need} admin/maintainer approval(s); have ${qualified}."
            exit 1
          fi
