name: Approval policy

# Enforces the conditional approval policy from CONTRIBUTING.md:
#   - PR authored by sunhaoxiangwang -> requires >= 1 admin/maintainer approval
#   - PR authored by anyone else     -> requires >= 2 admin/maintainer approvals
# A qualifying approver has repo permission "admin" or "maintain". Only the
# latest APPROVED review per reviewer counts; the author is excluded; a PR
# author's own review never counts.
#
# Design (no stale red / no canceled jobs):
#   * Runs ONLY on review events (submitted/edited/dismissed) + manual dispatch.
#     It does NOT run on PR open/synchronize, so there are no canceled runs and
#     no red check before the first review — the required `approval-policy`
#     check is simply absent/pending until someone reviews, which keeps the PR
#     un-mergeable (branch protection treats a missing required check as pending).
#   * Publishes a SINGLE check-run named `approval-policy` on the PR HEAD sha via
#     the Checks API. (A `pull_request_review` workflow's own `github.sha` is the
#     base branch, so the natural job check-run would attach to the wrong commit;
#     creating the check-run explicitly on the head sha is what branch protection
#     evaluates.) No commit statuses are written.
#   * The job always exits 0, so the Actions run itself is never red — the verdict
#     lives entirely in the published check-run's conclusion.
#
# Branch protection requires the check context "approval-policy" (this check-run's
# name); no app_id pinning until this behavior is verified.

on:
  pull_request_review:
    types: [submitted, edited, dismissed]
  workflow_dispatch:
    inputs:
      pr:
        description: "PR number to (re)evaluate (manual recovery)"
        required: true
        type: string

permissions:
  contents: read
  pull-requests: read
  checks: write

jobs:
  approval-policy:
    name: approval-policy
    runs-on: ubuntu-latest
    steps:
      - name: Evaluate approval policy and publish the check-run
        env:
          GH_TOKEN: ${{ github.token }}
          OWNER: ${{ github.repository_owner }}
          REPO: ${{ github.event.repository.name }}
          EVENT: ${{ github.event_name }}
          PR_REVIEW: ${{ github.event.pull_request.number }}
          PR_DISPATCH: ${{ github.event.inputs.pr }}
        run: |
          set -euo pipefail

          # Resolve PR number for either trigger, then fetch author + head sha.
          if [ "${EVENT}" = "workflow_dispatch" ]; then PR="${PR_DISPATCH}"; else PR="${PR_REVIEW}"; fi
          meta=$(gh api "repos/${OWNER}/${REPO}/pulls/${PR}")
          AUTHOR=$(echo "${meta}" | jq -r '.user.login')
          HEAD_SHA=$(echo "${meta}" | jq -r '.head.sha')
          echo "PR #${PR} by ${AUTHOR} @ ${HEAD_SHA}"

          # Latest review state per reviewer; keep only APPROVED; drop the author.
          approvers=$(gh api --paginate "repos/${OWNER}/${REPO}/pulls/${PR}/reviews" \
            | jq -r '
                group_by(.user.login)
                | map(max_by(.submitted_at))
                | map(select(.state == "APPROVED"))
                | .[].user.login' \
            | sort -u | grep -vx "${AUTHOR}" || true)
          echo "Approvers (author excluded): ${approvers:-none}"

          # Count reviewers whose repo permission is admin or maintain.
          qualified=0
          for u in ${approvers}; do
            perm=$(gh api "repos/${OWNER}/${REPO}/collaborators/${u}/permission" \
              --jq '.permission' 2>/dev/null || echo "unknown")
            echo "  reviewer ${u}: permission=${perm}"
            case "${perm}" in
              admin|maintain) qualified=$((qualified + 1)) ;;
            esac
          done

          if [ "${AUTHOR}" = "sunhaoxiangwang" ]; then need=1; else need=2; fi
          desc="${qualified}/${need} admin-or-maintainer approvals"
          echo "Result: ${desc}"
          if [ "${qualified}" -ge "${need}" ]; then concl="success"; else concl="failure"; fi

          # Publish exactly one check-run named "approval-policy" on the PR head sha.
          gh api -X POST "repos/${OWNER}/${REPO}/check-runs" --input - >/dev/null <<JSON
          {
            "name": "approval-policy",
            "head_sha": "${HEAD_SHA}",
            "status": "completed",
            "conclusion": "${concl}",
            "output": { "title": "Approval policy", "summary": "${desc}" }
          }
          JSON
          echo "Published approval-policy check-run: ${concl} (${desc})"
          # The job never fails — the required gate is the published check-run.
