# SUM Chain — SNIP V2 local-mirror compose preset.
#
# **Purpose:** the smallest possible chain SNIP needs for V2 client integration
# tests. One validator producing blocks, RPC exposed on `localhost:8545`, no
# Prometheus, no Grafana, no fullnode separation. Optimized for fast spin-up
# in CI loops, not for any kind of production realism.
#
# **NOT production-like. NOT fault-tolerant.**
# - One validator means a single container outage halts block production
#   (PoA round-robin can't skip a missing proposer; see
#   crates/consensus/src/poa.rs:213-238).
# - PoR challenge generation, archive-node assignment, and reorg behavior are
#   exercised on this preset only against this single proposer's view.
# - Do NOT use this preset for performance benchmarks, security testing, or
#   any "looks like mainnet" claims. It exists to verify SNIP V2 client code
#   round-trips against a working chain end-to-end. Nothing more.
#
# **Chain ID 31337** (from `genesis/snip-mirror-genesis.json`) — Hardhat-style
# "this is unambiguously a local devnet" chain ID. Distinct from `local_genesis
# .json`'s 1337 and from any plausible mainnet ID. Refusing to mix this chain
# with mainnet is a SNIP-client-side concern; the chain ID is the signal.
#
# **Single validator on purpose**: PoA round-robin requires every validator
# in the set to produce, so a single-validator genesis is the only way to
# get block production from one container. The 3-validator `local_genesis
# .json` won't make progress with only validator-1 running because
# heights assigned to the absent validators 2/3 stall the chain.
#
# Usage:
#   docker-compose -f deploy/snip-local-mirror.yaml up -d --build
#   curl -s -X POST -H 'Content-Type: application/json' \
#        --data '{"jsonrpc":"2.0","id":1,"method":"chain_id","params":[]}' \
#        http://localhost:8545
#   docker-compose -f deploy/snip-local-mirror.yaml down -v   # stop + wipe
#
# Files referenced are real, checked-in artifacts — no `./deploy/config/...`
# placeholders to chase:
#   ./genesis/snip-mirror-genesis.json — chain_id 31337, ONE validator pubkey
#                                         (matches keys/validator1.json), same
#                                         pre-funded test accounts as
#                                         local_genesis.json so SNIP can reuse
#                                         their funded-account pubkeys.
#   ./keys/validator1.json             — JSON-encoded [u8; 32] private-key seed.
#                                         Format consumed by KeyPair::from_bytes
#                                         per crates/node/src/main.rs:367-371.

services:
  validator:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: snip-mirror-validator
    hostname: validator
    command:
      - "run"
      - "--genesis"
      - "/config/genesis.json"
      - "--data-dir"
      - "/data"
      - "--validator-key"
      - "/secrets/validator.key"
      - "--p2p-addr"
      - "/ip4/0.0.0.0/tcp/30303"
      - "--rpc-addr"
      - "0.0.0.0:8545"
    volumes:
      - validator-data:/data
      - ../genesis/snip-mirror-genesis.json:/config/genesis.json:ro
      - ../keys/validator1.json:/secrets/validator.key:ro
    ports:
      # RPC plus the health/readiness port. P2P (30303) and metrics (9090) stay
      # inside the compose network — SNIP doesn't need them and surfacing
      # extra ports invites confusion. If you need metrics, run the full
      # 3-validator `docker-compose.yaml` instead.
      - "8545:8545"
      # Health/readiness server (default 0.0.0.0:8546). Published so the host
      # orchestrator (issue #121) can poll GET /ready before registering this
      # single validator; the in-container healthcheck below also uses it.
      - "8546:8546"
    environment:
      - RUST_LOG=info,sumchain=debug
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8546/health"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: "no"  # crash → log; don't auto-restart on test failures

volumes:
  validator-data:
