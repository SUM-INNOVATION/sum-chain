# Prometheus configuration for SUM Chain
global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers: []

rule_files: []

scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # SUM Chain validators
  - job_name: 'sumchain-validators'
    static_configs:
      - targets:
          - 'validator-1:9090'
          - 'validator-2:9090'
          - 'validator-3:9090'
    relabel_configs:
      - source_labels: [__address__]
        regex: '(.*):\d+'
        target_label: instance
        replacement: '${1}'
