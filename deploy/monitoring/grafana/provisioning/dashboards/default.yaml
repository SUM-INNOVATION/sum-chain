# Grafana dashboard provisioning
apiVersion: 1

providers:
  - name: 'SUM Chain Dashboards'
    orgId: 1
    folder: 'SUM Chain'
    folderUid: sumchain
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
