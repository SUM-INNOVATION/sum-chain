# SUM Chain Validator 2 — single-replica StatefulSet, bootstraps off validator-1.
# See statefulset-validator-1.yaml for the design rationale.
---
apiVersion: v1
kind: Service
metadata:
  name: sumchain-validator-2
  namespace: sumchain
  labels:
    app.kubernetes.io/name: sumchain
    app.kubernetes.io/component: validator
    app.kubernetes.io/instance: validator-2
spec:
  clusterIP: None
  selector:
    app.kubernetes.io/name: sumchain
    app.kubernetes.io/instance: validator-2
  ports:
    - { name: p2p,     port: 30303, targetPort: p2p }
    - { name: rpc,     port: 8545,  targetPort: rpc }
    - { name: health,  port: 8546,  targetPort: health }
    - { name: metrics, port: 9090,  targetPort: metrics }
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: sumchain-validator-2
  namespace: sumchain
  labels:
    app.kubernetes.io/name: sumchain
    app.kubernetes.io/component: validator
    app.kubernetes.io/instance: validator-2
spec:
  serviceName: sumchain-validator-2
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: sumchain
      app.kubernetes.io/instance: validator-2
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sumchain
        app.kubernetes.io/component: validator
        app.kubernetes.io/instance: validator-2
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: sumchain
          image: sumchain/node:latest
          imagePullPolicy: IfNotPresent
          args:
            - "run"
            - "--config"
            - "/config/node.toml"
            - "--validator-key"
            - "/secrets/validator.key"
            # Bootnode: validator-1's stable per-pod DNS name. Format:
            # `<pod>.<headless-service>.<namespace>.svc.cluster.local`.
            - "--bootnodes"
            - "/dns4/sumchain-validator-1-0.sumchain-validator-1.sumchain.svc.cluster.local/tcp/30303"
          ports:
            - { name: p2p,     containerPort: 30303, protocol: TCP }
            - { name: rpc,     containerPort: 8545,  protocol: TCP }
            - { name: health,  containerPort: 8546,  protocol: TCP }
            - { name: metrics, containerPort: 9090,  protocol: TCP }
          env:
            - name: RUST_LOG
              value: "info,sumchain=debug"
          volumeMounts:
            - { name: config,        mountPath: /config,  readOnly: true }
            - { name: data,          mountPath: /data }
            - { name: validator-key, mountPath: /secrets, readOnly: true }
          resources:
            requests: { cpu: "500m",  memory: "1Gi" }
            limits:   { cpu: "2000m", memory: "4Gi" }
          livenessProbe:
            httpGet: { path: /health, port: health }
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet: { path: /ready, port: health }
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          startupProbe:
            httpGet: { path: /health, port: health }
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 30
      volumes:
        - name: config
          configMap:
            name: sumchain-config
        - name: validator-key
          secret:
            secretName: sumchain-validator-2-key
  volumeClaimTemplates:
    - metadata:
        name: data
        labels:
          app.kubernetes.io/name: sumchain
          app.kubernetes.io/instance: validator-2
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: fast-ssd
        resources:
          requests:
            storage: 100Gi
