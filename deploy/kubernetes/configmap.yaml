# SUM Chain Node Configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: sumchain-config
  namespace: sumchain
  labels:
    app.kubernetes.io/name: sumchain
    app.kubernetes.io/component: node
data:
  node.toml: |
    # SUM Chain Node Configuration

    [node]
    name = "sumchain-node"
    data_dir = "/data"
    log_level = "info"

    [chain]
    chain_id = 1337
    genesis_file = "/config/genesis.json"

    [network]
    listen_addr = "0.0.0.0"
    listen_port = 30303
    max_peers = 50
    enable_mdns = false

    [rpc]
    enabled = true
    listen_addr = "0.0.0.0"
    listen_port = 8545
    cors_origins = ["*"]
    rate_limit_enabled = true
    rate_limit_requests_per_second = 100

    [consensus]
    block_time_ms = 2000

    [mempool]
    max_size = 10000
    max_per_sender = 100

    [metrics]
    enabled = true
    prometheus_port = 9090

  genesis.json: |
    {
      "chain_id": 1337,
      "genesis_time": 0,
      "validators": [],
      "alloc": {},
      "params": {
        "block_time_ms": 2000,
        "max_block_bytes": 1000000,
        "max_txs_per_block": 1000,
        "min_fee": 1,
        "finality_depth": 3
      }
    }
