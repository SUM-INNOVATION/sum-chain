# SUM Chain Validator 1 — single-replica StatefulSet.
#
# Why three single-replica StatefulSets instead of one 3-replica StatefulSet:
# the original layout mounted ONE Secret into ALL pods at the same path, so
# every pod read the same validator key — that's one validator identity
# fronted by three pods, not a 3-validator chain. See deployment-prep doc
# §validator-keys for the rationale and §statefulset.yaml for the deprecated
# original layout retained for reference.
#
# Validator-1 is the bootnode for validators 2 and 3 (no `--bootnodes` arg
# itself). All three share `app.kubernetes.io/component: validator` so the
# LoadBalancer Service in service.yaml (sumchain-rpc) picks up all three.
# The per-validator headless Service `sumchain-validator-1` provides stable
# DNS for the pod (`sumchain-validator-1-0.sumchain-validator-1.sumchain
# .svc.cluster.local`) so the other validators can hard-code it as a bootnode.
---
apiVersion: v1
kind: Service
metadata:
  name: sumchain-validator-1
  namespace: sumchain
  labels:
    app.kubernetes.io/name: sumchain
    app.kubernetes.io/component: validator
    app.kubernetes.io/instance: validator-1
spec:
  clusterIP: None  # headless — provides stable per-pod DNS
  selector:
    app.kubernetes.io/name: sumchain
    app.kubernetes.io/instance: validator-1
  ports:
    - name: p2p
      port: 30303
      targetPort: p2p
    - name: rpc
      port: 8545
      targetPort: rpc
    - name: health
      port: 8546
      targetPort: health
    - name: metrics
      port: 9090
      targetPort: metrics
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: sumchain-validator-1
  namespace: sumchain
  labels:
    app.kubernetes.io/name: sumchain
    app.kubernetes.io/component: validator
    app.kubernetes.io/instance: validator-1
spec:
  serviceName: sumchain-validator-1
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: sumchain
      app.kubernetes.io/instance: validator-1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sumchain
        app.kubernetes.io/component: validator
        app.kubernetes.io/instance: validator-1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: sumchain
          image: sumchain/node:latest  # ops: pin to a versioned tag before rollout
          imagePullPolicy: IfNotPresent
          args:
            - "run"
            - "--config"
            - "/config/node.toml"
            - "--validator-key"
            - "/secrets/validator.key"
          ports:
            - { name: p2p,     containerPort: 30303, protocol: TCP }
            - { name: rpc,     containerPort: 8545,  protocol: TCP }
            - { name: health,  containerPort: 8546,  protocol: TCP }
            - { name: metrics, containerPort: 9090,  protocol: TCP }
          env:
            - name: RUST_LOG
              value: "info,sumchain=debug"
          volumeMounts:
            - { name: config,        mountPath: /config,  readOnly: true }
            - { name: data,          mountPath: /data }
            - { name: validator-key, mountPath: /secrets, readOnly: true }
          resources:
            requests: { cpu: "500m",  memory: "1Gi" }
            limits:   { cpu: "2000m", memory: "4Gi" }
          livenessProbe:
            httpGet: { path: /health, port: health }
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet: { path: /ready, port: health }
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          startupProbe:
            httpGet: { path: /health, port: health }
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 30
      volumes:
        - name: config
          configMap:
            name: sumchain-config
        - name: validator-key
          secret:
            secretName: sumchain-validator-1-key  # per-validator Secret
  volumeClaimTemplates:
    - metadata:
        name: data
        labels:
          app.kubernetes.io/name: sumchain
          app.kubernetes.io/instance: validator-1
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: fast-ssd
        resources:
          requests:
            storage: 100Gi
