# SUM Chain Validator StatefulSet — DEPRECATED 3-replica layout.
#
# This single StatefulSet mounts one Secret (`sumchain-validator-keys`) into
# all three pods at the same path, so all three would read the same validator
# private key. That gives one identity to three pods (the chain still works,
# but it's not a 3-validator chain — it's one validator with three replicas
# competing for the same proposer slot).
#
# Use the per-validator StatefulSets in the `statefulset-validator-{1,2,3}.yaml`
# split files (next commit) for an actual 3-validator deployment. This file is
# retained for reference and as a starting point for any "single-validator
# testnet" use case where one identity across replicas is acceptable.
#
# Schema-corrected from earlier revision:
# - args: now uses `run` subcommand + `--validator-key` (CLI shape per
#   crates/node/src/main.rs:48-103). Old shape `--config X --validator` would
#   fail with `error: unrecognized argument`.
# - Image tag was `sumchain/node:latest`; for SNIP testnet, ops should pin a
#   versioned tag (`sumchain/node:v3.2-snip-testnet` or similar) before rollout.
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: sumchain-validator
  namespace: sumchain
  labels:
    app.kubernetes.io/name: sumchain
    app.kubernetes.io/component: validator
spec:
  serviceName: sumchain-validator
  replicas: 3
  podManagementPolicy: Parallel
  selector:
    matchLabels:
      app.kubernetes.io/name: sumchain
      app.kubernetes.io/component: validator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sumchain
        app.kubernetes.io/component: validator
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: sumchain
          image: sumchain/node:latest
          imagePullPolicy: IfNotPresent
          args:
            - "run"
            - "--config"
            - "/config/node.toml"
            - "--validator-key"
            - "/secrets/validator.key"
          ports:
            - name: p2p
              containerPort: 30303
              protocol: TCP
            - name: rpc
              containerPort: 8545
              protocol: TCP
            - name: health
              containerPort: 8546
              protocol: TCP
            - name: metrics
              containerPort: 9090
              protocol: TCP
          env:
            - name: RUST_LOG
              value: "info,sumchain=debug"
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          volumeMounts:
            - name: config
              mountPath: /config
              readOnly: true
            - name: data
              mountPath: /data
            - name: validator-key
              mountPath: /secrets
              readOnly: true
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2000m"
              memory: "4Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: health
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /health
              port: health
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 30
      volumes:
        - name: config
          configMap:
            name: sumchain-config
        - name: validator-key
          secret:
            secretName: sumchain-validator-keys
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: sumchain
                    app.kubernetes.io/component: validator
                topologyKey: kubernetes.io/hostname
  volumeClaimTemplates:
    - metadata:
        name: data
        labels:
          app.kubernetes.io/name: sumchain
          app.kubernetes.io/component: validator
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: fast-ssd
        resources:
          requests:
            storage: 100Gi
